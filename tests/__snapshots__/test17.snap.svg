<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="10,153 770,153" data-type="line" data-label="" points="40.000000000000014,398.8421052631579 600,398.8421052631579" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><polyline data-points="260,10 260,153" data-type="line" data-label="" points="224.21052631578948,504.2105263157895 224.21052631578948,398.8421052631579" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><polyline data-points="440,153 440,510" data-type="line" data-label="" points="356.8421052631579,398.8421052631579 356.8421052631579,135.78947368421052" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><polyline data-points="440,360 770,360" data-type="line" data-label="" points="356.8421052631579,246.31578947368422 600,246.31578947368422" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><polyline data-points="520,10 520,153" data-type="line" data-label="" points="415.7894736842105,504.2105263157895 415.7894736842105,398.8421052631579" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><polyline data-points="610,360 610,510" data-type="line" data-label="" points="482.10526315789474,246.31578947368422 482.10526315789474,135.78947368421052" fill="none" stroke="#000" stroke-width="1.4736842105263157"/></g><g><rect data-type="rect" data-label="" data-x="130" data-y="76.5" x="40.000000000000014" y="406.2105263157895" width="176.84210526315786" height="98" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="390" data-y="76.5" x="231.57894736842107" y="406.2105263157895" width="176.8421052631579" height="98" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="650" data-y="76.5" x="423.1578947368421" y="406.2105263157895" width="176.84210526315792" height="98" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="220" data-y="336.5" x="40.000000000000014" y="135.78947368421052" width="309.4736842105263" height="255.68421052631578" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="610" data-y="256.5" x="364.2105263157895" y="253.68421052631578" width="235.78947368421052" height="137.78947368421052" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="525" data-y="440" x="364.2105263157895" y="135.78947368421052" width="110.5263157894737" height="103.15789473684214" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g><rect data-type="rect" data-label="" data-x="695" data-y="440" x="489.4736842105263" y="135.78947368421052" width="110.5263157894737" height="103.15789473684214" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="1.3571428571428572"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":0.7368421052631579,"c":0,"e":32.63157894736844,"b":0,"d":-0.7368421052631579,"f":511.57894736842104};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>