<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-17.5825,-12.942908487500002 13.182500000000001,-12.942908487500002" data-type="line" data-label="" points="40,335.9314304848572 529.9303284515854,335.9314304848572" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-8.214795756249998,-23.384999999999998 -8.214795756249998,-0.5" data-type="line" data-label="" points="189.1799908005119,502.2209583392578 189.1799908005119,137.77904166074222" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-8.214795756249998,-13.625 17.5825,-13.625" data-type="line" data-label="" points="189.1799908005119,346.7936869045926 600,346.7936869045926" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-2.0425000000000004,-12.942908487500002 -2.0425000000000004,-0.5" data-type="line" data-label="" points="287.4733399687189,335.9314304848572 287.4733399687189,137.77904166074222" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="0.007500000000000284,-23.384999999999998 0.007500000000000284,-13.625" data-type="line" data-label="" points="320.11943694013934,502.2209583392578 320.11943694013934,346.7936869045926" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="4.872091512500003,-12.942908487500002 4.872091512500003,-0.5" data-type="line" data-label="" points="397.5876936442486,335.9314304848572 397.5876936442486,137.77904166074222" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="6.9375,-23.384999999999998 6.9375,-13.625" data-type="line" data-label="" points="430.47916962889235,502.2209583392578 430.47916962889235,346.7936869045926" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="13.182500000000001,-23.384999999999998 13.182500000000001,-12.942908487500002" data-type="line" data-label="" points="529.9303284515854,502.2209583392578 529.9303284515854,335.9314304848572" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><rect data-type="rect" data-label="" data-x="-12.364591512499999" data-y="-6.44" x="84.75554537181856" y="137.77904166074222" width="76.67851556945831" height="189.18811318071948" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="10.322091512499998" data-y="-6.4399999999999995" x="413.51261899616094" y="175.40167780463528" width="141.73183563202048" height="113.94284089293333" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="-5.797363837499999" data-y="-6.440000000000001" x="193.28391164510168" y="189.2961751741789" width="68.78700400966869" height="86.15384615384616" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="1.1172276750000012" data-y="-6.44" x="293.92076635859524" y="194.9980094980805" width="87.74200193374088" height="74.75017750604295" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="-13.0275" data-y="-18.8825" x="40" y="395.4175318071947" width="145.07606995592207" height="70.202900270155" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="-3.7324999999999995" data-y="-18.8825" x="216.9259206597469" y="396.41283964168923" width="87.26859092848002" height="68.21228460116589" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="10.06" data-y="-18.8825" x="446.40409498080476" y="390.79496669984366" width="67.60130811886825" height="79.44803048485704" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="15.8825" data-y="-18.8825" x="545.8552538034978" y="404.24285511161673" width="54.14474619650218" height="52.552253661310885" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g><rect data-type="rect" data-label="" data-x="3.4725000000000006" data-y="-18.8825" x="336.04436229205174" y="358.8170055452866" width="78.5098819849282" height="143.4039527939712" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.06279464285714285"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":15.924925351912414,"c":0,"e":320,"b":0,"d":-15.924925351912414,"f":129.81657898478602};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>