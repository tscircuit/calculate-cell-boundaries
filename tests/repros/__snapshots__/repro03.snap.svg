<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-16.765,-5.425 -3.3674999999999997,-5.425" data-type="line" data-label="" points="40,441.8657565415245 283.86803185438,441.8657565415245" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-16.765,1.7424999999999997 -6.396249999999998,1.7424999999999997" data-type="line" data-label="" points="40,311.3993174061434 228.73720136518773,311.3993174061434" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-6.396249999999998,1.7424999999999997 -6.396249999999998,13.940000000000003" data-type="line" data-label="" points="228.73720136518773,311.3993174061434 228.73720136518773,89.37428896473264" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-6.396249999999998,3.034727674999999 14,3.034727674999999" data-type="line" data-label="" points="228.73720136518773,287.8775394766781 600,287.8775394766781" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-3.3674999999999997,-11.4 -3.3674999999999997,3.034727674999999" data-type="line" data-label="" points="283.86803185438,550.6257110352674 283.86803185438,287.8775394766781" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="-3.3674999999999997,-4.122227675 14,-4.122227675" data-type="line" data-label="" points="283.86803185438,418.15203959044374 600,418.15203959044374" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><polyline data-points="6.300000000000001,-11.4 6.300000000000001,13.940000000000003" data-type="line" data-label="" points="459.8407281001138,550.6257110352674 459.8407281001138,89.37428896473264" fill="none" stroke="#000" stroke-width="2.8000000000000003"/></g><g><rect data-type="rect" data-label="" data-x="-12" data-y="8" x="82.91240045506254" y="89.37428896473267" width="87.64505119453929" height="216.24573378839597" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="-10.15" data-y="-1.4125" x="40" y="317.1786120591582" width="240.81911262798633" height="103.2992036405006" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="4.440892098500626e-16" data-y="7.3500000000000005" x="300.29579067121733" y="169.28327645051198" width="89.73833902161545" height="80.09101251422072" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="10.925" data-y="7.2125" x="488.0546075085324" y="156.54152445961324" width="111.9453924914676" height="110.580204778157" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="0.7749999999999995" data-y="-0.7972276749999991" x="286.91695108077363" y="306.7121729237771" width="144.70989761092147" height="101.83308941979521" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="10.6175" data-y="0.1999999999999993" x="491.6951080773606" y="308.63334971558595" width="93.46985210466437" height="61.68665665529011" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="-0.41375000000000006" data-y="-7.652772325000001" x="291.4675767918089" y="441.51162047781577" width="92.33219567690554" height="81.81033629123999" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="11.2" data-y="-8.4" x="518.0887372013651" y="465.9840728100114" width="61.88850967007966" height="60.068259385665556" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g><rect data-type="rect" data-label="" data-x="-10.7" data-y="-9" x="86.0978384527873" y="463.25369738339026" width="128.60068259385662" height="87.37201365187713" fill="rgba(255, 165, 0, 0.4)" stroke="#c87000" stroke-width="0.0549375"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":18.20250284414107,"c":0,"e":345.164960182025,"b":0,"d":-18.20250284414107,"f":343.1171786120592};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>